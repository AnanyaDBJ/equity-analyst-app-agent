command: ["npm", "run", "start"]
runtime: nodejs20

env:
  - name: DATABRICKS_SERVING_ENDPOINT
    valueFrom: serving-endpoint
  - name: DATABRICKS_SENTIMENT_ENDPOINT
    valueFrom: sentiment-endpoint
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: DATABRICKS_GENIE_ROOM_ID
    value: "provide your genie room ID"
